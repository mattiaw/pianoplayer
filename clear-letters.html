<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clear Singing Letter Piano</title>
<style>
body{margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;font-family:system-ui,sans-serif}#app{background:#fff;padding:30px;border-radius:16px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.05)}#status{font-weight:700;color:#374151;min-height:1.4em;margin-bottom:10px}button{border:2px solid #111827;border-radius:999px;padding:8px 16px;font:inherit;font-weight:800;background:#e8f5e9;color:#166534;cursor:pointer}.wrap{margin-top:20px;user-select:none}svg{touch-action:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.05))}.key{cursor:pointer;stroke-width:1}.C{fill:#ff4a4a;stroke:#c92a2a}.D{fill:#ff922b;stroke:#d9480f}.E{fill:#fcc419;stroke:#e67700}.F{fill:#51cf66;stroke:#2b8a3e}.G{fill:#37b24d;stroke:#2b8a3e}.A{fill:#339af0;stroke:#1864ab}.B{fill:#845ef7;stroke:#5f3dc4}.black{fill:#343a40;stroke:#212529}.active{filter:brightness(.78)}.label{pointer-events:none;opacity:0;font-weight:900;text-anchor:middle;dominant-baseline:middle}.label.show{opacity:1}.white-label{fill:#111827;font-size:28px}.black-label{fill:#fff;font-size:17px}
</style>
</head>
<body><div id="app"><div id="status">Tap a key. C, G, and A use distinct pitch-locked phonemes.</div><button id="toggle" aria-pressed="true">Singing: On</button><div class="wrap"><svg id="piano" width="480" height="230" viewBox="0 0 480 230"><g><rect id="C4" class="key C" x="0" y="0" width="60" height="220" rx="6"/><rect id="D4" class="key D" x="60" y="0" width="60" height="220" rx="6"/><rect id="E4" class="key E" x="120" y="0" width="60" height="220" rx="6"/><rect id="F4" class="key F" x="180" y="0" width="60" height="220" rx="6"/><rect id="G4" class="key G" x="240" y="0" width="60" height="220" rx="6"/><rect id="A4" class="key A" x="300" y="0" width="60" height="220" rx="6"/><rect id="B4" class="key B" x="360" y="0" width="60" height="220" rx="6"/><rect id="C5" class="key C" x="420" y="0" width="60" height="220" rx="6"/></g><g><rect id="Db4" class="key black" x="42" y="0" width="36" height="130" rx="4"/><rect id="Eb4" class="key black" x="102" y="0" width="36" height="130" rx="4"/><rect id="Gb4" class="key black" x="222" y="0" width="36" height="130" rx="4"/><rect id="Ab4" class="key black" x="282" y="0" width="36" height="130" rx="4"/><rect id="Bb4" class="key black" x="342" y="0" width="36" height="130" rx="4"/></g></svg></div></div>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ctx=null,noise=null,singing=true,nodes=[],timer=null,seq=0;
const notes={C4:[261.63,'C'],Db4:[277.18,'D♭'],D4:[293.66,'D'],Eb4:[311.13,'E♭'],E4:[329.63,'E'],F4:[349.23,'F'],Gb4:[369.99,'G♭'],G4:[392,'G'],Ab4:[415.3,'A♭'],A4:[440,'A'],Bb4:[466.16,'B♭'],B4:[493.88,'B'],C5:[523.25,'C']};
const forms={ee:[300,2300,3000],eh:[530,1850,2500]};
function init(){if(!ctx){ctx=new AC();noise=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);const d=noise.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}return ctx.state==='suspended'?ctx.resume():Promise.resolve()}
function keep(n){nodes.push(n);return n}function env(g,s,d,l,a=.006,r=.035){const e=s+d;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(l,s+a);g.gain.setValueAtTime(l,Math.max(s+a,e-r));g.gain.exponentialRampToValueAtTime(.0001,e)}
function burst(dest,s,d,c,q,l,hp=0){const src=keep(ctx.createBufferSource());src.buffer=noise;src.loop=true;let p=src;if(hp){const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;p.connect(f);p=f}const b=ctx.createBiquadFilter();b.type='bandpass';b.frequency.value=c;b.Q.value=q;const g=ctx.createGain();env(g,s,d,l,.002,.018);p.connect(b);b.connect(g);g.connect(dest);src.start(s);src.stop(s+d+.01)}
function vowel(dest,s,d,f,from,to=from,l=.48){const a=forms[from],b=forms[to],src=keep(ctx.createOscillator());src.type='sawtooth';src.frequency.setValueAtTime(f,s);const sg=ctx.createGain();env(sg,s,d,l,.007,.045);src.connect(sg);[[0,1,8],[1,.68,11],[2,.38,13]].forEach(([i,m,q])=>{const fl=ctx.createBiquadFilter();fl.type='bandpass';fl.Q.value=q;fl.frequency.setValueAtTime(a[i],s);fl.frequency.linearRampToValueAtTime(b[i],s+d);const g=ctx.createGain();g.gain.value=m;sg.connect(fl);fl.connect(g);g.connect(dest)});const fundamental=keep(ctx.createOscillator());fundamental.type='sine';fundamental.frequency.setValueAtTime(f,s);const fg=ctx.createGain();env(fg,s,d,.07,.005,.04);fundamental.connect(fg);fg.connect(dest);src.start(s);fundamental.start(s);src.stop(s+d+.02);fundamental.stop(s+d+.02)}
function voice(id,s){const f=notes[id][0],m=ctx.createGain(),c=ctx.createDynamicsCompressor();m.gain.value=.72;c.threshold.value=-18;c.ratio.value=3;m.connect(c);c.connect(ctx.destination);if(id==='C4'||id==='C5'){burst(m,s,.075,6500,1.05,.22,3200);vowel(m,s+.06,.38,f,'ee');return .45}if(id==='G4'){burst(m,s,.025,1200,1,.16,180);burst(m,s+.018,.06,3200,1,.17,1200);vowel(m,s+.065,.37,f,'ee');return .44}if(id==='A4'){vowel(m,s,.44,f,'eh','ee',.54);return .44}return 0}
function piano(id,s,d,quiet=false){const f=notes[id][0],g=ctx.createGain(),a=keep(ctx.createOscillator()),b=keep(ctx.createOscillator()),hg=ctx.createGain();a.type='triangle';b.type='sine';a.frequency.value=f;b.frequency.value=f*2;hg.gain.value=quiet?.12:.22;const p=quiet?.045:.24;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(p,s+.006);g.gain.exponentialRampToValueAtTime(p*.55,s+.075);g.gain.setValueAtTime(Math.max(.0002,p*.3),Math.max(s+.09,s+d-.05));g.gain.exponentialRampToValueAtTime(.0001,s+d);a.connect(g);b.connect(hg);hg.connect(g);g.connect(ctx.destination);a.start(s);b.start(s);a.stop(s+d+.02);b.stop(s+d+.02)}
function stop(){seq++;if(timer)clearTimeout(timer);nodes.forEach(n=>{try{n.stop()}catch(_){}});nodes=[];document.querySelectorAll('.active').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.show').forEach(x=>x.classList.remove('show'))}
function labels(){const svg=document.getElementById('piano');Object.entries(notes).forEach(([id,n])=>{const k=document.getElementById(id),black=k.classList.contains('black'),x=+k.getAttribute('x')+(+k.getAttribute('width')/2),y=black?(+k.getAttribute('height')-28):(+k.getAttribute('height')-34),t=document.createElementNS('http://www.w3.org/2000/svg','text');t.id='L'+id;t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('class','label '+(black?'black-label':'white-label'));t.textContent=n[1];svg.appendChild(t)})}
async function play(id){await init();stop();const token=seq,s=ctx.currentTime+.018;let d=.58;if(singing&&(id==='C4'||id==='C5'||id==='G4'||id==='A4')){d=voice(id,s);piano(id,s,d,true);status.textContent=notes[id][1]+' — distinct phonemes at '+notes[id][0].toFixed(2)+' Hz'}else{piano(id,s,d,false);status.textContent=notes[id][1]+' — piano note'}const k=document.getElementById(id),l=document.getElementById('L'+id);k.classList.add('active');l.classList.add('show');timer=setTimeout(()=>{if(token!==seq)return;k.classList.remove('active');l.classList.remove('show')},d*1000)}
labels();toggle.onclick=async()=>{await init();stop();singing=!singing;toggle.setAttribute('aria-pressed',String(singing));toggle.textContent=singing?'Singing: On':'Singing: Off';status.textContent=singing?'Singing is on. C, G, and A are pitch-locked.':'Singing is off. Piano notes still play.'};piano.addEventListener('pointerdown',e=>{e.preventDefault();if(e.target.classList.contains('key'))play(e.target.id)});
</script></body></html>
