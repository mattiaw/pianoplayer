<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synchronized Singing Letter Piano</title>
<style>
body{margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif}
#app-container{text-align:center;background:#fff;padding:30px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
.status-message{margin-bottom:10px;color:#4b5563;font-size:1.1rem;font-weight:650;min-height:1.4em}
.voice-toggle{appearance:none;border:0;border-radius:999px;padding:8px 14px;margin-bottom:8px;background:#e8f5e9;color:#166534;font:inherit;font-weight:750;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(22,101,52,.16)}
.voice-toggle[aria-pressed="false"]{background:#f3f4f6;color:#6b7280;box-shadow:inset 0 0 0 1px rgba(107,114,128,.18)}
.keyboard-wrapper{position:relative;margin-top:20px;user-select:none;-webkit-user-select:none}
.keyboard-wrapper.loading{opacity:.62;pointer-events:none}
svg{filter:drop-shadow(0 4px 6px rgba(0,0,0,.05));touch-action:none}
.key{cursor:pointer;stroke-width:1px;transition:filter .05s ease}
.key-C{fill:#FF4A4A;stroke:#c92a2a}.key-D{fill:#FF922B;stroke:#d9480f}.key-E{fill:#FCC419;stroke:#e67700}.key-F{fill:#51CF66;stroke:#2b8a3e}.key-G{fill:#37B24D;stroke:#2b8a3e}.key-A{fill:#339AF0;stroke:#1864ab}.key-B{fill:#845EF7;stroke:#5f3dc4}
.white-key.active{filter:brightness(.80)}.black-key{fill:#343A40;stroke:#212529}.black-key.active{fill:#596169}
.note-label{pointer-events:none;opacity:0;transition:opacity .015s linear;font-weight:850;text-anchor:middle;dominant-baseline:middle}.note-label.visible{opacity:1}.white-note-label{fill:#111827;font-size:28px}.black-note-label{fill:#fff;font-size:17px}
</style>
</head>
<body>
<div id="app-container">
<div id="status" class="status-message">Preparing pitch-matched letter recordings…</div>
<button id="voice-toggle" class="voice-toggle" type="button" aria-pressed="true">Singing: On</button>
<div id="keyboard-wrapper" class="keyboard-wrapper loading">
<svg width="480" height="230" viewBox="0 0 480 230" id="piano-svg">
<g class="white-keys-group">
<rect id="key-C4" class="key white-key key-C" x="0" y="0" width="60" height="220" rx="6"/>
<rect id="key-D4" class="key white-key key-D" x="60" y="0" width="60" height="220" rx="6"/>
<rect id="key-E4" class="key white-key key-E" x="120" y="0" width="60" height="220" rx="6"/>
<rect id="key-F4" class="key white-key key-F" x="180" y="0" width="60" height="220" rx="6"/>
<rect id="key-G4" class="key white-key key-G" x="240" y="0" width="60" height="220" rx="6"/>
<rect id="key-A4" class="key white-key key-A" x="300" y="0" width="60" height="220" rx="6"/>
<rect id="key-B4" class="key white-key key-B" x="360" y="0" width="60" height="220" rx="6"/>
<rect id="key-C5" class="key white-key key-C" x="420" y="0" width="60" height="220" rx="6"/>
</g>
<g class="black-keys-group">
<rect id="key-Db4" class="key black-key" x="42" y="0" width="36" height="130" rx="4"/>
<rect id="key-Eb4" class="key black-key" x="102" y="0" width="36" height="130" rx="4"/>
<rect id="key-Gb4" class="key black-key" x="222" y="0" width="36" height="130" rx="4"/>
<rect id="key-Ab4" class="key black-key" x="282" y="0" width="36" height="130" rx="4"/>
<rect id="key-Bb4" class="key black-key" x="342" y="0" width="36" height="130" rx="4"/>
</g>
</svg>
</div>
</div>
<script src="audio-data-1.js"></script>
<script src="audio-data-2.js"></script>
<script src="audio-data-3.js"></script>
<script src="audio-data-4.js"></script>
<script src="audio-data-5.js"></script>
<script>
const AudioContextClass=window.AudioContext||window.webkitAudioContext;
const audioCtx=new AudioContextClass();
let singingOn=true;
let voicesReady=false;
let activeNodes=[];
let activeTimer=null;
let playSequence=0;
const voiceBuffers=new Map();

const notes={
'key-C4':{frequency:261.63,label:'C',name:'C'},
'key-Db4':{frequency:277.18,label:'D♭',name:'D flat'},
'key-D4':{frequency:293.66,label:'D',name:'D'},
'key-Eb4':{frequency:311.13,label:'E♭',name:'E flat'},
'key-E4':{frequency:329.63,label:'E',name:'E'},
'key-F4':{frequency:349.23,label:'F',name:'F'},
'key-Gb4':{frequency:369.99,label:'G♭',name:'G flat'},
'key-G4':{frequency:392.00,label:'G',name:'G'},
'key-Ab4':{frequency:415.30,label:'A♭',name:'A flat'},
'key-A4':{frequency:440.00,label:'A',name:'A'},
'key-Bb4':{frequency:466.16,label:'B♭',name:'B flat'},
'key-B4':{frequency:493.88,label:'B',name:'B'},
'key-C5':{frequency:523.25,label:'C',name:'C'}
};

function dataUriToArrayBuffer(uri){
 const comma=uri.indexOf(',');
 const binary=atob(uri.slice(comma+1));
 const bytes=new Uint8Array(binary.length);
 for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
 return bytes.buffer;
}

function findAudibleRange(buffer){
 const channel=buffer.getChannelData(0);
 const threshold=.006;
 let first=0;
 let last=channel.length-1;
 const windowSize=Math.max(32,Math.floor(buffer.sampleRate*.002));
 function windowPeak(start){
  let peak=0;
  const end=Math.min(channel.length,start+windowSize);
  for(let i=start;i<end;i++)peak=Math.max(peak,Math.abs(channel[i]));
  return peak;
 }
 while(first<channel.length-windowSize&&windowPeak(first)<threshold)first+=windowSize;
 while(last>windowSize&&windowPeak(Math.max(0,last-windowSize))<threshold)last-=windowSize;
 const preRoll=Math.floor(buffer.sampleRate*.006);
 const postRoll=Math.floor(buffer.sampleRate*.018);
 first=Math.max(0,first-preRoll);
 last=Math.min(channel.length-1,last+postRoll);
 return{offset:first/buffer.sampleRate,duration:Math.max(.12,(last-first)/buffer.sampleRate)};
}

async function prepareVoices(){
 const entries=Object.entries(window.sungLetterAudio||{});
 if(!entries.length)throw new Error('The tuned voice recordings did not load.');
 await Promise.all(entries.map(async([noteId,uri])=>{
  const buffer=await audioCtx.decodeAudioData(dataUriToArrayBuffer(uri).slice(0));
  const range=findAudibleRange(buffer);
  voiceBuffers.set(noteId,{buffer,...range});
 }));
 voicesReady=true;
 document.getElementById('keyboard-wrapper').classList.remove('loading');
 document.getElementById('status').textContent='Ready. Voice and note now start together at the key pitch.';
}

function stopCurrent(){
 playSequence+=1;
 if(activeTimer){clearTimeout(activeTimer);activeTimer=null}
 activeNodes.forEach(node=>{try{node.stop()}catch(_){}});
 activeNodes=[];
 document.querySelectorAll('.key.active').forEach(k=>k.classList.remove('active'));
 document.querySelectorAll('.note-label.visible').forEach(l=>l.classList.remove('visible'));
}

function showKey(noteId,durationSeconds,sequence){
 const key=document.getElementById(noteId);
 const label=document.getElementById(`label-${noteId}`);
 key.classList.add('active');
 label.classList.add('visible');
 activeTimer=setTimeout(()=>{
  if(sequence!==playSequence)return;
  key.classList.remove('active');
  label.classList.remove('visible');
  activeTimer=null;
 },Math.ceil(durationSeconds*1000));
}

function schedulePiano(noteId,when,duration,voicePresent){
 const frequency=notes[noteId].frequency;
 const master=audioCtx.createGain();
 const tone=audioCtx.createOscillator();
 const harmonic=audioCtx.createOscillator();
 const harmonicGain=audioCtx.createGain();
 tone.type='triangle';
 harmonic.type='sine';
 tone.frequency.setValueAtTime(frequency,when);
 harmonic.frequency.setValueAtTime(frequency*2,when);
 harmonicGain.gain.value=voicePresent?.12:.22;
 const peak=voicePresent?.055:.24;
 master.gain.setValueAtTime(.0001,when);
 master.gain.exponentialRampToValueAtTime(peak,when+.006);
 master.gain.exponentialRampToValueAtTime(peak*.55,when+.075);
 master.gain.setValueAtTime(Math.max(.0002,peak*.34),Math.max(when+.09,when+duration-.055));
 master.gain.exponentialRampToValueAtTime(.0001,when+duration);
 tone.connect(master);
 harmonic.connect(harmonicGain);
 harmonicGain.connect(master);
 master.connect(audioCtx.destination);
 tone.start(when);harmonic.start(when);
 tone.stop(when+duration+.025);harmonic.stop(when+duration+.025);
 activeNodes.push(tone,harmonic);
}

function scheduleVoice(noteId,when){
 const voice=voiceBuffers.get(noteId);
 if(!voice)return null;
 const source=audioCtx.createBufferSource();
 source.buffer=voice.buffer;
 const highShelf=audioCtx.createBiquadFilter();
 highShelf.type='highshelf';
 highShelf.frequency.value=2600;
 highShelf.gain.value=5.5;
 const presence=audioCtx.createBiquadFilter();
 presence.type='peaking';
 presence.frequency.value=1450;
 presence.Q.value=.8;
 presence.gain.value=2.5;
 const compressor=audioCtx.createDynamicsCompressor();
 compressor.threshold.value=-22;
 compressor.knee.value=10;
 compressor.ratio.value=3.5;
 compressor.attack.value=.002;
 compressor.release.value=.055;
 const gain=audioCtx.createGain();
 gain.gain.setValueAtTime(1.15,when);
 gain.gain.setValueAtTime(1.15,Math.max(when,when+voice.duration-.035));
 gain.gain.exponentialRampToValueAtTime(.0001,when+voice.duration);
 source.connect(highShelf);
 highShelf.connect(presence);
 presence.connect(compressor);
 compressor.connect(gain);
 gain.connect(audioCtx.destination);
 source.start(when,voice.offset,voice.duration);
 source.stop(when+voice.duration+.015);
 activeNodes.push(source);
 return voice.duration;
}

async function playNote(noteId){
 if(!notes[noteId])return;
 if(audioCtx.state==='suspended')await audioCtx.resume();
 if(!voicesReady&&singingOn){
  document.getElementById('status').textContent='The tuned voice recordings are still preparing…';
  return;
 }
 stopCurrent();
 const sequence=playSequence;
 const when=audioCtx.currentTime+.018;
 let duration=.56;
 if(singingOn){
  duration=scheduleVoice(noteId,when)||.56;
  schedulePiano(noteId,when,duration,true);
  document.getElementById('status').textContent=`${notes[noteId].name}: voice and note synchronized at ${notes[noteId].frequency.toFixed(2)} Hz`;
 }else{
  schedulePiano(noteId,when,duration,false);
  document.getElementById('status').textContent=`${notes[noteId].name}: piano note only`;
 }
 showKey(noteId,duration,sequence);
}

function createLabels(){
 const svg=document.getElementById('piano-svg');
 Object.entries(notes).forEach(([noteId,config])=>{
  const key=document.getElementById(noteId);
  const isBlack=key.classList.contains('black-key');
  const x=Number(key.getAttribute('x'))+Number(key.getAttribute('width'))/2;
  const y=isBlack?Number(key.getAttribute('height'))-28:Number(key.getAttribute('height'))-34;
  const label=document.createElementNS('http://www.w3.org/2000/svg','text');
  label.id=`label-${noteId}`;
  label.setAttribute('x',x);
  label.setAttribute('y',y);
  label.setAttribute('class',`note-label ${isBlack?'black-note-label':'white-note-label'}`);
  label.textContent=config.label;
  svg.appendChild(label);
 });
}

createLabels();
prepareVoices().catch(error=>{
 document.getElementById('status').textContent=`Voice loading error: ${error.message}`;
 document.getElementById('keyboard-wrapper').classList.remove('loading');
});

document.getElementById('voice-toggle').addEventListener('click',async function(){
 if(audioCtx.state==='suspended')await audioCtx.resume();
 stopCurrent();
 singingOn=!singingOn;
 this.setAttribute('aria-pressed',String(singingOn));
 this.textContent=singingOn?'Singing: On':'Singing: Off';
 document.getElementById('status').textContent=singingOn
  ?'Singing is on: the pitch-matched voice and piano begin together.'
  :'Singing is off: every key still plays its piano note.';
});

document.getElementById('piano-svg').addEventListener('pointerdown',event=>{
 event.preventDefault();
 if(event.target.classList.contains('key'))void playNote(event.target.id);
});
</script>
</body>
</html>
