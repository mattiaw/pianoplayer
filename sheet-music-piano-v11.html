line{stroke:#6b7280;stroke-width:1.4}.bar-line{stroke:#9ca3af;stroke-width:1.1}.notehead{fill:#111827;stroke:#111827;stroke-width:1.2}.notehead.open{fill:#fff}.note-stem,.ledger-line,.flag{stroke:#111827;stroke-width:1.5;fill:none}.note-group{cursor:pointer}.note-group.active .notehead,.note-group.selected .notehead{fill:#ef4444;stroke:#ef4444}.note-group.active .notehead.open,.note-group.selected .notehead.open{fill:#fff;stroke:#ef4444}.note-group.active .note-stem,.note-group.active .ledger-line,.note-group.active .flag,.note-group.active .accidental,.note-group.active .note-name,.note-group.selected .note-stem,.note-group.selected .ledger-line,.note-group.selected .flag,.note-group.selected .accidental,.note-group.selected .note-name{stroke:#ef4444;fill:#ef4444}.clef{font-size:62px;fill:#111827;font-family:'Times New Roman',serif}.tempo-mark,.octave-mark{font-size:18px;fill:#111827;font-weight:700}.accidental{font-size:24px;fill:#111827;font-family:'Times New Roman',serif}.note-name{font-size:13px;font-weight:700;fill:#4b5563}.wrap{margin-top:4px;user-select:none;-webkit-user-select:none}svg.piano{touch-action:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.05))}.key{cursor:pointer;stroke-width:1;transition:filter .04s ease}.C{fill:#ff4a4a;stroke:#c92a2a}.D{fill:#ff922b;stroke:#d9480f}.E{fill:#fcc419;stroke:#e67700}.F{fill:#51cf66;stroke:#2b8a3e}.G{fill:#37b24d;stroke:#2b8a3e}.A{fill:#339af0;stroke:#1864ab}.B{fill:#845ef7;stroke:#5f3dc4}.black{fill:#343a40;stroke:#212529}.key.active{filter:brightness(.76)}.key-label{pointer-events:none;opacity:1;font-weight:900;text-anchor:middle;dominant-baseline:middle}.white-label{fill:#111827;font-size:22px}.black-label{fill:#fff;font-size:13px}#footer{font-size:.78rem;color:#6b7280;margin-top:12px}

<body>
<div id="app">
<div id="status">Click a staff note to change its note or duration. Octave Down is locked at C4–C5 for now.</div>

<div class="controls">

<button class="song-button" data-song="ode">Ode to Joy</button>

<div class="edit-controls">

<label for="tempo-slider" class="tempo-label">Tempo: ♩ = <span id="tempo-value">112</span> BPM</label>

<button id="octave-up" class="octave-button">Octave Up</button>

<button id="next-note" class="nav-button">Next Note</button>
<button id="delete-note" class="delete-button">Delete Selected</button>
</div>
<div id="saved-controls" class="saved-controls"></div>
<div id="score-wrap"><svg id="score-svg" xmlns="http://www.w3.org/2000/svg" width="960" viewBox="0 0 960 300" aria-label="Sheet music"></svg></div>
<div class="wrap"><svg id="piano" class="piano" width="480" height="230" viewBox="0 0 480 230" aria-label="One octave piano keyboard"><g><rect data-step="C" class="key C" x="0" y="0" width="60" height="220" rx="6"/><rect data-step="D" class="key D" x="60" y="0" width="60" height="220" rx="6"/><rect data-step="E" class="key E" x="120" y="0" width="60" height="220" rx="6"/><rect data-step="F" class="key F" x="180" y="0" width="60" height="220" rx="6"/><rect data-step="G" class="key G" x="240" y="0" width="60" height="220" rx="6"/><rect data-step="A" class="key A" x="300" y="0" width="60" height="220" rx="6"/><rect data-step="B" class="key B" x="360" y="0" width="60" height="220" rx="6"/><rect data-step="Ctop" class="key C" x="420" y="0" width="60" height="220" rx="6"/></g><g><rect data-step="Db" class="key black" x="42" y="0" width="36" height="130" rx="4"/><rect data-step="Eb" class="key black" x="102" y="0" width="36" height="130" rx="4"/><rect data-step="Gb" class="key black" x="222" y="0" width="36" height="130" rx="4"/><rect data-step="Ab" class="key black" x="282" y="0" width="36" height="130" rx="4"/><rect data-step="Bb" class="key black" x="342" y="0" width="36" height="130" rx="4"/></g></svg></div>
<div id="footer">Sheet Music v11 — locked low octave, visible current octave, sixteenth notes, selected note editing, and Play Staff</div>
</div>
<script>
const AudioContextClass=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,activeNodes=[],playToken=0,currentEntries=[],selectedIndex=-1,currentTitle='Your Notes',currentSongId='twinkle',tempoBpm=112,currentOctave=4,isManual=false;
const MIN_OCTAVE=4,MAX_OCTAVE=5,STAFF_TOP=64,STAFF_SPACING=18,C4_Y=154,NOTE_SPACING=44,START_X=92,STORAGE_KEY='pianoplayerSavedStaffsV1';
const scoreWrap=document.getElementById('score-wrap'),scoreSvg=document.getElementById('score-svg'),statusEl=document.getElementById('status'),noteSelect=document.getElementById('note-select'),durationSelect=document.getElementById('duration-select'),tempoSlider=document.getElementById('tempo-slider'),tempoValue=document.getElementById('tempo-value'),octaveLabel=document.getElementById('octave-label'),currentOctaveBanner=document.getElementById('current-octave-banner'),octaveDown=document.getElementById('octave-down'),octaveUp=document.getElementById('octave-up'),buttonEls=[...document.querySelectorAll('.song-button')],savedControls=document.getElementById('saved-controls'),piano=document.getElementById('piano'),ns='http://www.w3.org/2000/svg';
const stepInfo={C:{name:'C',label:'C',diatonic:'C'},Db:{name:'Db',label:'D♭',diatonic:'D'},D:{name:'D',label:'D',diatonic:'D'},Eb:{name:'Eb',label:'E♭',diatonic:'E'},E:{name:'E',label:'E',diatonic:'E'},F:{name:'F',label:'F',diatonic:'F'},Gb:{name:'Gb',label:'G♭',diatonic:'G'},G:{name:'G',label:'G',diatonic:'G'},Ab:{name:'Ab',label:'A♭',diatonic:'A'},A:{name:'A',label:'A',diatonic:'A'},Bb:{name:'Bb',label:'B♭',diatonic:'B'},B:{name:'B',label:'B',diatonic:'B'},Ctop:{name:'C',label:'C',diatonic:'C',top:true}};
const keyOrder=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B','Ctop'],naturalIndex={C:0,D:1,E:2,F:3,G:4,A:5,B:6},semi={C:0,Db:1,D:2,Eb:3,E:4,F:5,Gb:6,G:7,Ab:8,A:9,Bb:10,B:11};
const songs={twinkle:{title:'Twinkle Twinkle Little Star',notes:[['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]]},mary:{title:'Mary Had a Little Lamb',notes:[['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',2],['D4',1],['D4',1],['D4',2],['E4',1],['G4',1],['G4',2],['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',1],['E4',1],['D4',1],['D4',1],['E4',1],['D4',1],['C4',2]]},ode:{title:'Ode to Joy',notes:[['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['E4',1.5],['D4',.5],['D4',2],['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['D4',1.5],['C4',.5],['C4',2]]},jingle:{title:'Jingle Bells',notes:[['E4',1],['E4',1],['E4',2],['E4',1],['E4',1],['E4',2],['E4',1],['G4',1],['C4',1.5],['D4',.5],['E4',4],['F4',1],['F4',1],['F4',1.5],['F4',.5],['F4',1],['E4',1],['E4',1],['E4',.5],['E4',.5],['E4',1],['D4',1],['D4',1],['E4',1],['D4',2],['G4',2]]}};
function ensureContext(){if(!audioCtx)audioCtx=new AudioContextClass();return audioCtx.state==='suspended'?audioCtx.resume():Promise.resolve()}function wait(ms){return new Promise(r=>setTimeout(r,ms))}function svgEl(tag,attrs={}){const el=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el}function parseNote(id){const m=id.match(/^([A-G](?:b)?)(\d)$/);return{name:m[1],octave:parseInt(m[2],10)}}function noteLabel(id){const p=parseNote(id);const found=Object.values(stepInfo).find(s=>s.name===p.name&&!s.top);return(found?found.label:p.name)+p.octave}function midi(id){const p=parseNote(id);return 12*(p.octave+1)+semi[p.name]}function frequency(id){return 440*Math.pow(2,(midi(id)-69)/12)}function noteY(id){const p=parseNote(id);const found=Object.values(stepInfo).find(s=>s.name===p.name&&!s.top);const idx=naturalIndex[found.diatonic]+7*(p.octave-4);return C4_Y-idx*(STAFF_SPACING/2)}function isFlat(id){return parseNote(id).name.includes('b')}function keyNoteId(step){const info=stepInfo[step],oct=info.top?currentOctave+1:currentOctave;return info.name+oct}function rangeNotes(){return keyOrder.map(keyNoteId)}function octaveRange(){return`C${currentOctave}–C${currentOctave+1}`}function transposeNote(id,offset){const p=parseNote(id);return p.name+(p.octave+offset)}function songEntries(songId){return songs[songId].notes.map(([id,d])=>[transposeNote(id,currentOctave-4),d])}
function populateNoteSelect(selected){const opts=rangeNotes();noteSelect.innerHTML='';if(selected&&!opts.includes(selected)){const o=document.createElement('option');o.value=selected;o.textContent=noteLabel(selected);noteSelect.appendChild(o)}opts.forEach(id=>{const o=document.createElement('option');o.value=id;o.textContent=noteLabel(id);noteSelect.appendChild(o)});if(selected)noteSelect.value=selected}function updateOctaveUi(){currentOctave=Math.max(MIN_OCTAVE,Math.min(MAX_OCTAVE,currentOctave));octaveLabel.textContent=octaveRange();currentOctaveBanner.textContent=`Current Keyboard Octave: ${octaveRange()}`;octaveDown.disabled=currentOctave<=MIN_OCTAVE;octaveUp.disabled=currentOctave>=MAX_OCTAVE;document.querySelectorAll('.key').forEach(key=>{const id=keyNoteId(key.dataset.step);key.dataset.note=id;key.id='key-'+id});updateKeyLabels();populateNoteSelect(selectedIndex>=0&&currentEntries[selectedIndex]?currentEntries[selectedIndex][0]:null)}
function updateKeyLabels(){document.querySelectorAll('.key-label').forEach(e=>e.remove());document.querySelectorAll('.key').forEach(key=>{const id=key.dataset.note,x=Number(key.getAttribute('x'))+Number(key.getAttribute('width'))/2,y=key.classList.contains('black')?Number(key.getAttribute('height'))-28:Number(key.getAttribute('height'))-34,t=svgEl('text',{id:'K'+id,x,y,class:'key-label '+(key.classList.contains('black')?'black-label':'white-label')});t.textContent=noteLabel(id);piano.appendChild(t)})}
function clearPlayingButtons(){buttonEls.forEach(b=>b.classList.remove('playing'));document.querySelectorAll('.saved-button.playing').forEach(b=>b.classList.remove('playing'));document.getElementById('play-staff').classList.remove('playing')}function stopSound(){activeNodes.forEach(n=>{try{n.stop()}catch(_){}});activeNodes=[]}function clearVisuals(){document.querySelectorAll('.note-group.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.key.active').forEach(e=>e.classList.remove('active'))}function stopSong(){playToken++;stopSound();clearVisuals();clearPlayingButtons();statusEl.textContent='Stopped. Click Play Staff or click piano keys to write notes.'}function durationName(v){return v==.25?'sixteenth note':v==.5?'eighth note':v==1?'quarter note':v==2?'half note':'whole note'}function beatMs(){return 60000/tempoBpm}function setTempo(v,redraw=true){tempoBpm=Math.max(50,Math.min(180,parseInt(v,10)||112));tempoSlider.value=String(tempoBpm);tempoValue.textContent=String(tempoBpm);if(redraw)renderStaff()}
function playPiano(id,duration){if(!audioCtx)return;const when=audioCtx.currentTime+.01,f=frequency(id),main=audioCtx.createOscillator(),harm=audioCtx.createOscillator(),gain=audioCtx.createGain(),harmGain=audioCtx.createGain();main.type='triangle';harm.type='sine';main.frequency.setValueAtTime(f,when);harm.frequency.setValueAtTime(f*2,when);harmGain.gain.value=.2;gain.gain.setValueAtTime(.0001,when);gain.gain.exponentialRampToValueAtTime(.25,when+.008);gain.gain.exponentialRampToValueAtTime(.13,when+.08);gain.gain.setValueAtTime(.08,Math.max(when+.1,when+duration-.06));gain.gain.exponentialRampToValueAtTime(.0001,when+duration);main.connect(gain);harm.connect(harmGain);harmGain.connect(gain);gain.connect(audioCtx.destination);main.start(when);harm.start(when);main.stop(when+duration+.03);harm.stop(when+duration+.03);activeNodes.push(main,harm)}function activateKey(id){const k=document.querySelector(`[data-note="${id}"]`);if(k)k.classList.add('active')}function deactivateKey(id){const k=document.querySelector(`[data-note="${id}"]`);if(k)k.classList.remove('active')}function scrollToElement(el){if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}function scrollToNote(i){scrollToElement(document.getElementById('N'+i))}function durationGlyph(d){if(d===4)return{open:true,stem:false,flags:0};if(d===2)return{open:true,stem:true,flags:0};if(d===.25)return{open:false,stem:true,flags:2};if(d===.5)return{open:false,stem:true,flags:1};return{open:false,stem:true,flags:0}}
function drawStaff(width){scoreSvg.innerHTML='';scoreSvg.setAttribute('width',width);scoreSvg.setAttribute('viewBox',`0 0 ${width} 300`);const title=svgEl('text',{x:22,y:24,fill:'#111827','font-size':'18','font-weight':'700'});title.textContent=currentTitle;scoreSvg.appendChild(title);const tempo=svgEl('text',{x:92,y:45,class:'tempo-mark'});tempo.textContent=`♩ = ${tempoBpm}`;scoreSvg.appendChild(tempo);const oct=svgEl('text',{x:190,y:45,class:'octave-mark'});oct.textContent=`Current keyboard octave: ${octaveRange()}`;scoreSvg.appendChild(oct);for(let i=0;i<5;i++){const y=STAFF_TOP+i*STAFF_SPACING;scoreSvg.appendChild(svgEl('line',{x1:20,y1:y,x2:width-24,y2:y,class:'staff-line'}))}const clef=svgEl('text',{x:26,y:STAFF_TOP+58,class:'clef'});clef.textContent='𝄞';scoreSvg.appendChild(clef)}function drawLedgerLines(group,x,y){const bottom=STAFF_TOP+STAFF_SPACING*4,top=STAFF_TOP;if(y>bottom+STAFF_SPACING/2){for(let ly=bottom+STAFF_SPACING;ly<=y+1;ly+=STAFF_SPACING)group.appendChild(svgEl('line',{x1:x-14,y1:ly,x2:x+14,y2:ly,class:'ledger-line'}))}if(y<top-STAFF_SPACING/2){for(let ly=top-STAFF_SPACING;ly>=y-1;ly-=STAFF_SPACING)group.appendChild(svgEl('line',{x1:x-14,y1:ly,x2:x+14,y2:ly,class:'ledger-line'}))}}
function drawNote(id,index,duration,active=false){const x=START_X+index*NOTE_SPACING,y=noteY(id),selected=index===selectedIndex,group=svgEl('g',{class:active?'note-group active':selected?'note-group selected':'note-group',id:'N'+index,'data-note':id}),rhythm=durationGlyph(duration),stemDown=y<STAFF_TOP+STAFF_SPACING*2;group.addEventListener('pointerdown',e=>{e.stopPropagation();selectNote(index)});drawLedgerLines(group,x,y);if(isFlat(id)){const a=svgEl('text',{x:x-20,y:y+7,class:'accidental'});a.textContent='♭';group.appendChild(a)}group.appendChild(svgEl('ellipse',{cx:x,cy:y,rx:10,ry:7,transform:`rotate(-20 ${x} ${y})`,class:rhythm.open?'notehead open':'notehead'}));if(rhythm.stem){if(stemDown)group.appendChild(svgEl('line',{x1:x-9,y1:y+1,x2:x-9,y2:y+34,class:'note-stem'}));else group.appendChild(svgEl('line',{x1:x+9,y1:y-1,x2:x+9,y2:y-34,class:'note-stem'}))}if(rhythm.flags){const flag1=stemDown?`M ${x-9} ${y+34} q -20 -8 -8 -24`:`M ${x+9} ${y-34} q 20 8 8 24`;group.appendChild(svgEl('path',{d:flag1,class:'flag'}));if(rhythm.flags>1){const flag2=stemDown?`M ${x-9} ${y+44} q -20 -8 -8 -24`:`M ${x+9} ${y-24} q 20 8 8 24`;group.appendChild(svgEl('path',{d:flag2,class:'flag'}))}}const n=svgEl('text',{x:x,y:282,class:'note-name'});n.textContent=noteLabel(id);group.appendChild(n);scoreSvg.appendChild(group)}function addBarLines(){let beats=0;currentEntries.forEach(([,d],i)=>{beats+=d;if(i<currentEntries.length-1&&Math.abs(beats%4)<.001){const x=START_X+i*NOTE_SPACING+22;scoreSvg.appendChild(svgEl('line',{x1:x,y1:STAFF_TOP,x2:x,y2:STAFF_TOP+STAFF_SPACING*4,class:'bar-line'}))}})}function renderStaff(){const width=Math.max(960,START_X+currentEntries.length*NOTE_SPACING+110);drawStaff(width);currentEntries.forEach(([id,d],i)=>drawNote(id,i,d,false));addBarLines()}
function selectNote(index){if(!currentEntries.length)return;selectedIndex=Math.max(0,Math.min(index,currentEntries.length-1));const[id,d]=currentEntries[selectedIndex];populateNoteSelect(id);durationSelect.value=String(d);renderStaff();scrollToNote(selectedIndex);statusEl.textContent=`Selected ${noteLabel(id)}. Use Change Note or Note Length to edit it.`}function changeSelectedNote(){if(selectedIndex<0||!currentEntries[selectedIndex]){statusEl.textContent='Select a note on the staff first.';return}const old=currentEntries[selectedIndex][0],next=noteSelect.value;currentEntries[selectedIndex][0]=next;isManual=true;currentSongId=null;renderStaff();scrollToNote(selectedIndex);statusEl.textContent=`Changed ${noteLabel(old)} to ${noteLabel(next)}.`}function changeDuration(){const d=parseFloat(durationSelect.value)||1;if(selectedIndex>=0&&currentEntries[selectedIndex]){currentEntries[selectedIndex][1]=d;isManual=true;currentSongId=null;renderStaff();scrollToNote(selectedIndex);statusEl.textContent=`Changed ${noteLabel(currentEntries[selectedIndex][0])} to a ${durationName(d)}.`}else statusEl.textContent=`New notes will be entered as ${durationName(d)}s.`}
function loadSong(songId){currentSongId=songId;isManual=false;selectedIndex=-1;currentTitle=songs[songId].title;currentEntries=songEntries(songId);populateNoteSelect(null);renderStaff();scoreWrap.scrollLeft=0}
function changeOctave(delta){const next=Math.max(MIN_OCTAVE,Math.min(MAX_OCTAVE,currentOctave+delta));if(next===currentOctave)return;let transposeStaff=false;if(currentEntries.length){transposeStaff=confirm('Transpose all notes on the staff to the new octave?\n\nOK = move existing staff notes up/down.\nCancel = keep existing staff notes as written. The keyboard and Change Note choices will still change octave.')}currentOctave=next;updateOctaveUi();if(transposeStaff){currentEntries=currentEntries.map(([id,d])=>[transposeNote(id,delta),d]);isManual=true;currentSongId=null;statusEl.textContent=`Octave changed to ${octaveRange()}, and existing staff notes were moved ${delta>0?'up':'down'} one octave.`}else{if(currentEntries.length){isManual=true;currentSongId=null;statusEl.textContent=`Keyboard and Change Note changed to ${octaveRange()}. Existing staff notes stayed the same.`}else statusEl.textContent=`Octave changed to ${octaveRange()}.`}renderStaff();if(selectedIndex>=0&&currentEntries[selectedIndex])selectNote(selectedIndex)}
function clearStaff(){playToken++;stopSound();clearVisuals();clearPlayingButtons();currentEntries=[];selectedIndex=-1;currentSongId=null;isManual=true;currentTitle='Blank Staff';renderStaff();scoreWrap.scrollLeft=0;statusEl.textContent=`Staff cleared. New notes will use octave ${octaveRange()}.`}
function getSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(_){return {}}}function setSaved(saved){localStorage.setItem(STORAGE_KEY,JSON.stringify(saved))}function renderSavedButtons(){const saved=getSaved(),names=Object.keys(saved).filter(name=>saved[name]&&saved[name].showButton);savedControls.innerHTML='';if(!names.length)return;const label=document.createElement('span');label.className='saved-label';label.textContent='Saved:';savedControls.appendChild(label);names.forEach(name=>{const button=document.createElement('button');button.className='saved-button';button.textContent=name;button.addEventListener('click',()=>void playSaved(name,button));savedControls.appendChild(button)})}function saveStaff(){if(!currentEntries.length){alert('There are no notes on the staff to save.');return}let name=prompt('Name this saved staff:','My Notes');if(name===null)return;name=name.trim();if(!name){alert('Save cancelled because no name was entered.');return}const saved=getSaved();if(saved[name]&&!confirm('A saved staff with that name already exists. Replace it?'))return;const showButton=confirm('Create a button for this saved staff on the interface?');saved[name]={title:name,notes:currentEntries.map(([n,d])=>[n,d]),tempo:tempoBpm,octave:currentOctave,showButton,createdAt:new Date().toISOString()};setSaved(saved);renderSavedButtons();statusEl.textContent=showButton?`Saved "${name}" and created a button.`:`Saved "${name}" without creating a button.`}
async function playNoteSequence(list,title,token){for(let i=0;i<list.length;i++){if(token!==playToken)return;const[id,d]=list[i],totalMs=beatMs()*d,soundDuration=Math.max(.18,totalMs*.86/1000),noteGroup=document.getElementById('N'+i);clearVisuals();if(noteGroup)noteGroup.classList.add('active');activateKey(id);scrollToNote(i);playPiano(id,soundDuration);statusEl.textContent=`${title}: ${noteLabel(id)} (${durationName(d)}) at ♩ = ${tempoBpm}`;await wait(totalMs*.86);deactivateKey(id);if(noteGroup)noteGroup.classList.remove('active');await wait(totalMs*.14)}}async function playCurrentStaff(){if(!currentEntries.length){statusEl.textContent='There are no notes on the staff to play.';return}await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();const token=++playToken,button=document.getElementById('play-staff');button.classList.add('playing');statusEl.textContent=`Playing current staff: ${currentTitle}.`;await playNoteSequence(currentEntries,currentTitle||'Current Staff',token);if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished playing current staff: ${currentTitle}.`}}async function playSaved(name,button){const saved=getSaved()[name];if(!saved||!saved.notes||!saved.notes.length){alert('This saved staff could not be found.');renderSavedButtons();return}await ensureContext();stopSong();if(saved.tempo)setTempo(saved.tempo,false);if(saved.octave){currentOctave=Math.max(MIN_OCTAVE,Math.min(MAX_OCTAVE,saved.octave));updateOctaveUi()}currentEntries=saved.notes.map(([n,d])=>[n,d]);currentTitle=saved.title||name;currentSongId=null;isManual=true;selectedIndex=-1;renderStaff();const token=++playToken;if(button)button.classList.add('playing');await playNoteSequence(currentEntries,currentTitle,token);if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished saved staff: ${currentTitle}.`}}
async function playNoteManually(id){await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();if(!isManual){currentEntries=[];currentTitle='Your Notes';currentSongId=null;selectedIndex=-1;isManual=true}const d=parseFloat(durationSelect.value)||1;currentEntries.push([id,d]);selectedIndex=currentEntries.length-1;populateNoteSelect(id);renderStaff();const noteGroup=document.getElementById('N'+selectedIndex);activateKey(id);scrollToElement(noteGroup);playPiano(id,Math.max(.12,Math.min(1.2,d*.45)));statusEl.textContent=`Added ${noteLabel(id)} as a ${durationName(d)}. Press Play Staff to hear all notes.`;setTimeout(()=>{deactivateKey(id);if(noteGroup)noteGroup.classList.remove('active')},520)}async function playSong(songId){await ensureContext();stopSong();loadSong(songId);const token=++playToken,button=document.querySelector(`.song-button[data-song="${songId}"]`);if(button)button.classList.add('playing');statusEl.textContent=`Playing ${songs[songId].title} in ${octaveRange()} at ♩ = ${tempoBpm}.`;await playNoteSequence(currentEntries,songs[songId].title,token);if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished ${songs[songId].title}. Click any note to edit it.`}}
function moveSelected(delta){if(!currentEntries.length){statusEl.textContent='No notes yet. Click piano keys to add notes.';return}selectNote(selectedIndex<0?0:selectedIndex+delta)}function deleteSelected(){if(selectedIndex<0||!currentEntries[selectedIndex]){statusEl.textContent='Select a note first, then delete it.';return}const removed=currentEntries.splice(selectedIndex,1)[0];selectedIndex=Math.min(selectedIndex,currentEntries.length-1);isManual=true;currentSongId=null;renderStaff();if(selectedIndex>=0)selectNote(selectedIndex);statusEl.textContent=`Deleted ${noteLabel(removed[0])}.`}
updateOctaveUi();setTempo(112,false);durationSelect.value='1';loadSong('twinkle');renderSavedButtons();buttonEls.forEach(b=>b.addEventListener('click',()=>void playSong(b.dataset.song)));document.getElementById('play-staff').addEventListener('click',()=>void playCurrentStaff());document.getElementById('stop-song').addEventListener('click',stopSong);document.getElementById('clear-staff').addEventListener('click',clearStaff);document.getElementById('save-staff').addEventListener('click',saveStaff);document.getElementById('prev-note').addEventListener('click',()=>moveSelected(-1));document.getElementById('next-note').addEventListener('click',()=>moveSelected(1));document.getElementById('delete-note').addEventListener('click',deleteSelected);document.getElementById('octave-down').addEventListener('click',()=>changeOctave(-1));document.getElementById('octave-up').addEventListener('click',()=>changeOctave(1));noteSelect.addEventListener('change',changeSelectedNote);durationSelect.addEventListener('change',changeDuration);tempoSlider.addEventListener('input',e=>{setTempo(e.target.value,true);statusEl.textContent=`Tempo changed to ♩ = ${tempoBpm} BPM.`});piano.addEventListener('pointerdown',e=>{e.preventDefault();const key=e.target.closest('.key');if(key)void playNoteManually(key.dataset.note)});
</script>
