<style>
body{margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif}#app{width:min(1060px,100%);background:#fff;padding:28px;border-radius:18px;box-shadow:0 10px 28px rgba(0,0,0,.07);text-align:center}#status{font-weight:700;color:#374151;min-height:1.4em;margin-bottom:12px}.controls,.edit-controls,.saved-controls{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:12px}.saved-controls{margin-top:-4px}.edit-controls{padding:10px;border:1px solid #dbeafe;border-radius:14px;background:#f8fbff}label{font-weight:800;color:#374151;align-self:center}select{border:1px solid #111827;border-radius:999px;padding:8px 12px;font:inherit;font-weight:800;background:#fff;color:#111827}input[type=range]{width:170px;accent-color:#4f46e5;align-self:center}button{border:1px solid #111827;border-radius:999px;padding:8px 14px;font:inherit;font-weight:700;background:#eef2ff;color:#3730a3;cursor:pointer}button:hover,button.playing{background:#c7d2fe}#play-staff{background:#e0f2fe;color:#075985}#stop-song{background:#fff1f2;color:#9f1239}#clear-staff{background:#ecfeff;color:#155e75}#save-staff{background:#f0fdf4;color:#166534}.nav-button{background:#fefce8;color:#854d0e}.delete-button{background:#fff1f2;color:#9f1239}.saved-button{background:#fff7ed;color:#9a3412}.saved-label{font-size:.82rem;color:#6b7280;align-self:center;font-weight:700}.tempo-label{min-width:160px;text-align:right}#score-wrap{overflow-x:auto;overflow-y:hidden;border:1px solid #d1d5db;border-radius:14px;background:#fcfdff;padding:10px 0 8px;margin-bottom:20px;scroll-behavior:smooth}#score-svg{display:block;height:220px}.staff-line{stroke:#6b7280;stroke-width:1.4}.bar-line{stroke:#9ca3af;stroke-width:1.1}.notehead{fill:#111827;stroke:#111827;stroke-width:1.2}.notehead.open{fill:#fff}.note-stem,.ledger-line,.flag{stroke:#111827;stroke-width:1.5;fill:none}.note-group{cursor:pointer}.note-group.active .noteh <body>
<div id="app">

</div>
<script>
const AudioContextClass=window.AudioContext||window.webkitAudioContext;let audioCtx=null,activeNodes=[],playToken=0,manualNotes=[],currentStaffNotes=[],selectedIndex=-1,currentTitle='Your Notes',editable=false,tempoBpm=112;const STAFF_TOP=54,STAFF_SPACING=18,NOTE_SPACING=44,START_X=92,STORAGE_KEY='pianoplayerSavedStaffsV1',scoreWrap=document.getElementById('score-wrap'),scoreSvg=document.getElementById('score-svg'),statusEl=document.getElementById('status'),durationSelect=document.getElementById('duration-select'),tempoSlider=document.getElementById('tempo-slider'),tempoValue=document.getElementById('tempo-value'),buttonEls=[...document.querySelectorAll('.song-button')],savedControls=document.getElementById('saved-controls'),ns='http://www.w3.org/2000/svg';
const notes={C4:{frequency:261.63,label:'C',y:STAFF_TOP+STAFF_SPACING*5,accidental:''},Db4:{frequency:277.18,label:'D♭',y:STAFF_TOP+STAFF_SPACING*4.5,accidental:'♭'},D4:{frequency:293.66,label:'D',y:STAFF_TOP+STAFF_SPACING*4.5,accidental:''},Eb4:{frequency:311.13,label:'E♭',y:STAFF_TOP+STAFF_SPACING*4,accidental:'♭'},E4:{frequency:329.63,label:'E',y:STAFF_TOP+STAFF_SPACING*4,accidental:''},F4:{frequency:349.23,label:'F',y:STAFF_TOP+STAFF_SPACING*3.5,accidental:''},Gb4:{frequency:369.99,label:'G♭',y:STAFF_TOP+STAFF_SPACING*3,accidental:'♭'},G4:{frequency:392,label:'G',y:STAFF_TOP+STAFF_SPACING*3,accidental:''},Ab4:{frequency:415.3,label:'A♭',y:STAFF_TOP+STAFF_SPACING*2.5,accidental:'♭'},A4:{frequency:440,label:'A',y:STAFF_TOP+STAFF_SPACING*2.5,accidental:''},Bb4:{frequency:466.16,label:'B♭',y:STAFF_TOP+STAFF_SPACING*2,accidental:'♭'},B4:{frequency:493.88,label:'B',y:STAFF_TOP+STAFF_SPACING*2,accidental:''},C5:{frequency:523.25,label:'C',y:STAFF_TOP+STAFF_SPACING*1.5,accidental:''}};
const songs={twinkle:{title:'Twinkle Twinkle Little Star',notes:[['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]]},mary:{title:'Mary Had a Little Lamb',notes:[['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',2],['D4',1],['D4',1],['D4',2],['E4',1],['G4',1],['G4',2],['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',1],['E4',1],['D4',1],['D4',1],['E4',1],['D4',1],['C4',2]]},ode:{title:'Ode to Joy',notes:[['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['E4',1.5],['D4',.5],['D4',2],['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['D4',1.5],['C4',.5],['C4',2]]},jingle:{title:'Jingle Bells',notes:[['E4',1],['E4',1],['E4',2],['E4',1],['E4',1],['E4',2],['E4',1],['G4',1],['C4',1.5],['D4',.5],['E4',4],['F4',1],['F4',1],['F4',1.5],['F4',.5],['F4',1],['E4',1],['E4',1],['E4',.5],['E4',.5],['E4',1],['D4',1],['D4',1],['E4',1],['D4',2],['G4',2]]}};
function ensureContext(){if(!audioCtx)audioCtx=new AudioContextClass();return audioCtx.state==='suspended'?audioCtx.resume():Promise.resolve()}function wait(ms){return new Promise(r=>setTimeout(r,ms))}function svgEl(tag,attrs={}){const el=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el}function clearPlayingButtons(){buttonEls.forEach(b=>b.classList.remove('playing'));document.querySelectorAll('.saved-button.playing').forEach(b=>b.classList.remove('playing'));document.getElementById('play-staff').classList.remove('playing')}function stopSound(){activeNodes.forEach(n=>{try{n.stop()}catch(_){}});activeNodes=[]}function clearVisuals(){document.querySelectorAll('.note-group.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.key.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.key-label.show').forEach(e=>e.classList.remove('show'))}function stopSong(){playToken++;stopSound();clearVisuals();clearPlayingButtons();statusEl.textContent='Stopped. Click Play Staff or click piano keys to write notes.'}function durationName(v){return v==.5?'eighth note':v==1?'quarter note':v==2?'half note':'whole note'}function beatMs(){return 60000/tempoBpm}function setTempo(v,redraw=true){tempoBpm=Math.max(50,Math.min(180,parseInt(v,10)||112));tempoSlider.value=String(tempoBpm);tempoValue.textContent=String(tempoBpm);if(redraw){if(editable)renderEditableScore(selectedIndex);else renderStaticScore(currentTitle,currentStaffNotes,'N')}}
function playPiano(noteId,duration){if(!audioCtx)return;const when=audioCtx.currentTime+.01,f=notes[noteId].frequency,main=audioCtx.createOscillator(),harm=audioCtx.createOscillator(),gain=audioCtx.createGain(),harmGain=audioCtx.createGain();main.type='triangle';harm.type='sine';main.frequency.setValueAtTime(f,when);harm.frequency.setValueAtTime(f*2,when);harmGain.gain.value=.2;gain.gain.setValueAtTime(.0001,when);gain.gain.exponentialRampToValueAtTime(.25,when+.008);gain.gain.exponentialRampToValueAtTime(.13,when+.08);gain.gain.setValueAtTime(.08,Math.max(when+.1,when+duration-.06));gain.gain.exponentialRampToValueAtTime(.0001,when+duration);main.connect(gain);harm.connect(harmGain);harmGain.connect(gain);gain.connect(audioCtx.destination);main.start(when);harm.start(when);main.stop(when+duration+.03);harm.stop(when+duration+.03);activeNodes.push(main,harm)}
function activateKey(noteId){const k=document.getElementById(noteId);if(k)k.classList.add('active');const l=document.getElementById('K'+noteId);if(l)l.classList.add('show')}function deactivateKey(noteId){const k=document.getElementById(noteId);if(k)k.classList.remove('active');const l=document.getElementById('K'+noteId);if(l)l.classList.remove('show')}function scrollToElement(el){if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}function scrollToNote(i,prefix='N'){scrollToElement(document.getElementById(prefix+i))}function durationGlyph(d){if(d===4)return{open:true,stem:false,flag:false};if(d===2)return{open:true,stem:true,flag:false};if(d===.5)return{open:false,stem:true,flag:true};return{open:false,stem:true,flag:false}}
function drawStaff(width,titleText){scoreSvg.innerHTML='';scoreSvg.setAttribute('width',width);scoreSvg.setAttribute('viewBox',`0 0 ${width} 220`);const title=svgEl('text',{x:22,y:24,fill:'#111827','font-size':'18','font-weight':'700'});title.textContent=titleText;scoreSvg.appendChild(title);const tempoMark=svgEl('text',{x:92,y:45,class:'tempo-mark'});tempoMark.textContent=`♩ = ${tempoBpm}`;scoreSvg.appendChild(tempoMark);for(let i=0;i<5;i++){const y=STAFF_TOP+i*STAFF_SPACING;scoreSvg.appendChild(svgEl('line',{x1:20,y1:y,x2:width-24,y2:y,class:'staff-line'}))}const clef=svgEl('text',{x:26,y:STAFF_TOP+58,class:'clef'});clef.textContent='𝄞';scoreSvg.appendChild(clef)}function clearStaff(){playToken++;stopSound();clearVisuals();clearPlayingButtons();manualNotes=[];currentStaffNotes=[];selectedIndex=-1;editable=true;currentTitle='Blank Staff';drawStaff(960,'Blank Staff — choose a note length, then click piano keys');scoreWrap.scrollLeft=0;statusEl.textContent=`Staff cleared. Add notes, then use Play Staff. Tempo is ♩ = ${tempoBpm}.`}
function drawNote(noteId,index,beats,active=false,prefix='N',canEdit=false){const x=START_X+index*NOTE_SPACING,note=notes[noteId],selected=canEdit&&index===selectedIndex,group=svgEl('g',{class:active?'note-group active':selected?'note-group selected':'note-group',id:prefix+index,'data-note':noteId}),rhythm=durationGlyph(beats);if(canEdit)group.addEventListener('pointerdown',e=>{e.stopPropagation();selectNote(index)});if(noteId==='C4')group.appendChild(svgEl('line',{x1:x-14,y1:note.y,x2:x+14,y2:note.y,class:'ledger-line'}));if(note.accidental){const accidental=svgEl('text',{x:x-20,y:note.y+7,class:'accidental'});accidental.textContent=note.accidental;group.appendChild(accidental)}group.appendChild(svgEl('ellipse',{cx:x,cy:note.y,rx:10,ry:7,transform:`rotate(-20 ${x} ${note.y})`,class:rhythm.open?'notehead open':'notehead'}));if(rhythm.stem)group.appendChild(svgEl('line',{x1:x+9,y1:note.y-1,x2:x+9,y2:note.y-34,class:'note-stem'}));if(rhythm.flag)group.appendChild(svgEl('path',{d:`M ${x+9} ${note.y-34} q 20 8 8 24`,class:'flag'}));const noteName=svgEl('text',{x:x,y:176,class:'note-name'});noteName.textContent=note.label;group.appendChild(noteName);scoreSvg.appendChild(group);return group}
function addBarLines(noteList){let beats=0;noteList.forEach(([,duration],index)=>{beats+=duration;if(index<noteList.length-1&&Math.abs(beats%4)<.001){const x=START_X+index*NOTE_SPACING+22;scoreSvg.appendChild(svgEl('line',{x1:x,y1:STAFF_TOP,x2:x,y2:STAFF_TOP+STAFF_SPACING*4,class:'bar-line'}))}})}function renderStaticScore(title,noteList,prefix='N'){editable=false;selectedIndex=-1;currentTitle=title||'Song';currentStaffNotes=noteList.map(([n,d])=>[n,d]);const width=Math.max(960,START_X+noteList.length*NOTE_SPACING+110);drawStaff(width,currentTitle);noteList.forEach(([n,d],i)=>drawNote(n,i,d,false,prefix,false));addBarLines(noteList)}function renderEditableScore(activeIndex=-1){editable=true;currentStaffNotes=manualNotes.map(([n,d])=>[n,d]);const width=Math.max(960,START_X+manualNotes.length*NOTE_SPACING+110);drawStaff(width,currentTitle||'Your Notes');manualNotes.forEach(([n,d],i)=>drawNote(n,i,d,i===activeIndex,'M',true));addBarLines(manualNotes)}function buildScore(song){renderStaticScore(song.title,song.notes,'N')}
function selectNote(index){if(!manualNotes.length)return;selectedIndex=Math.max(0,Math.min(index,manualNotes.length-1));durationSelect.value=String(manualNotes[selectedIndex][1]);renderEditableScore(selectedIndex);scrollToNote(selectedIndex,'M');const[noteId,duration]=manualNotes[selectedIndex];statusEl.textContent=`Selected ${notes[noteId].label}. Change Note Length to edit it. Current length: ${durationName(duration)}.`}function makeKeyLabels(){const piano=document.getElementById('piano');Object.entries(notes).forEach(([id,note])=>{const key=document.getElementById(id),x=Number(key.getAttribute('x'))+Number(key.getAttribute('width'))/2,y=key.classList.contains('black')?Number(key.getAttribute('height'))-28:Number(key.getAttribute('height'))-34,text=svgEl('text',{id:'K'+id,x,y,class:'key-label '+(key.classList.contains('black')?'black-label':'white-label')});text.textContent=note.label;piano.appendChild(text)})}
function getSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(_){return {}}}function setSaved(saved){localStorage.setItem(STORAGE_KEY,JSON.stringify(saved))}function renderSavedButtons(){const saved=getSaved(),names=Object.keys(saved).filter(name=>saved[name]&&saved[name].showButton);savedControls.innerHTML='';if(!names.length)return;const label=document.createElement('span');label.className='saved-label';label.textContent='Saved:';savedControls.appendChild(label);names.forEach(name=>{const button=document.createElement('button');button.className='saved-button';button.textContent=name;button.addEventListener('click',()=>void playSaved(name,button));savedControls.appendChild(button)})}function saveStaff(){if(!currentStaffNotes.length){alert('There are no notes on the staff to save.');return}let name=prompt('Name this saved staff:','My Notes');if(name===null)return;name=name.trim();if(!name){alert('Save cancelled because no name was entered.');return}const saved=getSaved();if(saved[name]&&!confirm('A saved staff with that name already exists. Replace it?'))return;const showButton=confirm('Create a button for this saved staff on the interface?');saved[name]={title:name,notes:currentStaffNotes.map(([n,d])=>[n,d]),tempo:tempoBpm,showButton,createdAt:new Date().toISOString()};setSaved(saved);renderSavedButtons();statusEl.textContent=showButton?`Saved "${name}" at ♩ = ${tempoBpm} and created a button.`:`Saved "${name}" at ♩ = ${tempoBpm} without creating a button.`}
async function playSaved(name,button){const saved=getSaved()[name];if(!saved||!saved.notes||!saved.notes.length){alert('This saved staff could not be found.');renderSavedButtons();return}await ensureContext();stopSong();if(saved.tempo)setTempo(saved.tempo,false);manualNotes=saved.notes.map(([n,d])=>[n,d]);currentTitle=saved.title||name;renderEditableScore(-1);const token=++playToken;if(button)button.classList.add('playing');statusEl.textContent=`Playing saved staff: ${currentTitle} at ♩ = ${tempoBpm}.`;await playNoteSequence(manualNotes,currentTitle,token,'M');if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished saved staff: ${currentTitle}.`}}
async function playNoteSequence(list,title,token,prefix){for(let i=0;i<list.length;i++){if(token!==playToken)return;const[noteId,duration]=list[i],totalMs=beatMs()*duration,soundDuration=Math.max(.18,totalMs*.86/1000),noteGroup=document.getElementById(prefix+i);clearVisuals();if(noteGroup)noteGroup.classList.add('active');activateKey(noteId);scrollToNote(i,prefix);playPiano(noteId,soundDuration);statusEl.textContent=`${title}: ${notes[noteId].label} (${durationName(duration)}) at ♩ = ${tempoBpm}`;await wait(totalMs*.86);deactivateKey(noteId);if(noteGroup)noteGroup.classList.remove('active');await wait(totalMs*.14)}}async function playCurrentStaff(){const list=editable?manualNotes:currentStaffNotes;if(!list||!list.length){statusEl.textContent='There are no notes on the staff to play.';return}await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();const token=++playToken,prefix=editable?'M':'N',button=document.getElementById('play-staff');button.classList.add('playing');statusEl.textContent=`Playing current staff: ${currentTitle} at ♩ = ${tempoBpm}.`;await playNoteSequence(list,currentTitle||'Current Staff',token,prefix);if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished playing current staff: ${currentTitle}.`}}
async function playNoteManually(noteId){await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();if(!editable){manualNotes=[];currentTitle='Your Notes';selectedIndex=-1}const duration=parseFloat(durationSelect.value)||1;manualNotes.push([noteId,duration]);selectedIndex=manualNotes.length-1;renderEditableScore(selectedIndex);const noteGroup=document.getElementById('M'+selectedIndex);activateKey(noteId);scrollToElement(noteGroup);playPiano(noteId,Math.max(.3,Math.min(1.2,duration*.45)));statusEl.textContent=`Added ${notes[noteId].label} as a ${durationName(duration)}. Press Play Staff to hear all notes.`;setTimeout(()=>{deactivateKey(noteId);if(noteGroup)noteGroup.classList.remove('active')},520)}async function playSong(songId){await ensureContext();stopSong();manualNotes=[];const token=++playToken,song=songs[songId];if(!song)return;buildScore(song);clearPlayingButtons();const activeButton=document.querySelector(`.song-button[data-song="${songId}"]`);if(activeButton)activeButton.classList.add('playing');statusEl.textContent=`Playing ${song.title} at ♩ = ${tempoBpm}.`;await playNoteSequence(song.notes,song.title,token,'N');if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished ${song.title}.`}}
function changeDuration(){const duration=parseFloat(durationSelect.value)||1;if(editable&&selectedIndex>=0&&manualNotes[selectedIndex]){manualNotes[selectedIndex][1]=duration;renderEditableScore(selectedIndex);scrollToNote(selectedIndex,'M');const noteId=manualNotes[selectedIndex][0];statusEl.textContent=`Changed ${notes[noteId].label} to a ${durationName(duration)}.`}else statusEl.textContent=`New notes will be entered as ${durationName(duration)}s.`}function moveSelected(delta){if(!manualNotes.length){statusEl.textContent='No editable notes yet. Click piano keys to add notes.';return}selectNote(selectedIndex<0?0:selectedIndex+delta)}function deleteSelected(){if(!editable||selectedIndex<0||!manualNotes[selectedIndex]){statusEl.textContent='Select a note first, then delete it.';return}const removed=manualNotes.splice(selectedIndex,1)[0];selectedIndex=Math.min(selectedIndex,manualNotes.length-1);renderEditableScore(selectedIndex);if(selectedIndex>=0)scrollToNote(selectedIndex,'M');statusEl.textContent=`Deleted ${notes[removed[0]].label}.`}
makeKeyLabels();setTempo(112,false);durationSelect.value='1';buildScore(songs.twinkle);renderSavedButtons();buttonEls.forEach(b=>b.addEventListener('click',()=>void playSong(b.dataset.song)));document.getElementById('play-staff').addEventListener('click',()=>void playCurrentStaff());document.getElementById('stop-song').addEventListener('click',stopSong);document.getElementById('clear-staff').addEventListener('click',clearStaff);document.getElementById('save-staff').addEventListener('click',saveStaff);document.getElementById('prev-note').addEventListener('click',()=>moveSelected(-1));document.getElementById('next-note').addEventListener('click',()=>moveSelected(1));document.getElementById('delete-note').addEventListener('click',deleteSelected);durationSelect.addEventListener('change',changeDuration);tempoSlider.addEventListener('input',e=>{setTempo(e.target.value,true);statusEl.textContent=`Tempo changed to ♩ = ${tempoBpm} BPM.`});document.getElementById('piano').addEventListener('pointerdown',e=>{e.preventDefault();if(e.target.classList.contains('key'))void playNoteManually(e.target.id)});
</script>
