body{margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;font-family:system-ui,-apple-system,sans-serif}#app{width:min(1080px,100%);background:#fff;padding:28px;border-radius:18px;box-shadow:0 10px 28px rgba(0,0,0,.07);text-align:center}#status{font-weight:700;color:#374151;min-height:1.4em;margin-bottom:12px}.controls,.edit-controls,.saved-controls{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:12px}.saved-controls{margin-top:-4px}.edit-controls{padding:10px;border:1px solid #dbeafe;border-radius:14px;background:#f8fbff}label,.octave-display{font-weight:800;color:#374151;align-self:center}select{border:1px solid #111827;border-radius:999px;padding:8px 12px;font:inherit;font-weight:800;background:#fff;color:#111827}input[type=range]{width:170px;accent-color:#4f46e5;align-self:center}button{border:1px solid #111827;border-radius:999px;padding:8px 14px;font:inherit;font-weight:700;background:#eef2ff;color:#3730a3;cursor:pointer}button:hover,button.playing{background:#c7d2fe}button:disabled{opacity:.45;cursor:not-allowed}#play-staff{background:#e0f2fe;color:#075985}#stop-song{background:#fff1f2;color:#9f1239}#clear-staff{background:#ecfeff;color:#155e75}#save-staff{background:#f0fdf4;color:#166534}.nav-button{background:#fefce8;color:#854d0e}.delete-button{background:#fff1f2;color:#9f1239}.octave-button{background:#f5f3ff;color:#5b21b6}.saved-button{background:#fff7ed;color:#9a3412}.saved-label{font-size:.82rem;color:#6b7280;align-self:center;font-weight:700}.tempo-label{min-width:160px;text-align:right}#score-wrap{overflow-x:auto;overflow-y:hidden;border:1px solid #d1d5db;border-radius:14px;background:#fcfdff;padding:10px 0 8px;margin-bottom:20px;scroll-behavior:smooth}#score-svg{display:block;height:260px}.staff-line{stroke:#6b7280;stroke-width:1.4}.bar-line{stroke:#9ca3af;stroke-width:1.1}.notehead{fill:#111827;stroke:#111827;stroke-width:1.2}.notehead.open{fill:#fff}.note-stem,.l <body>
<div id="app">

<div class="controls"><button class="song-button" data-song="twinkle">Twinkle Twinkle</button><button class="song-button" data-song="mary">Mary Had a Little Lamb</button><button class="song-button" data-song="ode">Ode to Joy</button><button class="song-button" data-song="jingle">Jingle Bells</button><button id="play-staff">Play Staff</button><button id="stop-song">Stop Song</button><button id="clear-staff">Clear Staff</button><button id="save-staff">Save Staff</button></div>

</div>
<script>
const AudioContextClass=window.AudioContext||window.webkitAudioContext;let audioCtx=null,activeNodes=[],playToken=0,manualNotes=[],currentStaffNotes=[],selectedIndex=-1,currentTitle='Your Notes',currentSongId='twinkle',editable=false,tempoBpm=112,currentOctave=4;const MIN_OCTAVE=3,MAX_OCTAVE=5,STAFF_TOP=64,STAFF_SPACING=18,C4_Y=STAFF_TOP+90,NOTE_SPACING=44,START_X=92,STORAGE_KEY='pianoplayerSavedStaffsV1',scoreWrap=document.getElementById('score-wrap'),scoreSvg=document.getElementById('score-svg'),statusEl=document.getElementById('status'),durationSelect=document.getElementById('duration-select'),tempoSlider=document.getElementById('tempo-slider'),tempoValue=document.getElementById('tempo-value'),octaveLabel=document.getElementById('octave-label'),octaveDown=document.getElementById('octave-down'),octaveUp=document.getElementById('octave-up'),buttonEls=[...document.querySelectorAll('.song-button')],savedControls=document.getElementById('saved-controls'),piano=document.getElementById('piano'),ns='http://www.w3.org/2000/svg';
const stepInfo={C:{name:'C',label:'C',class:'C',diatonic:'C'},Db:{name:'Db',label:'D♭',class:'black',diatonic:'D'},D:{name:'D',label:'D',class:'D',diatonic:'D'},Eb:{name:'Eb',label:'E♭',class:'black',diatonic:'E'},E:{name:'E',label:'E',class:'E',diatonic:'E'},F:{name:'F',label:'F',class:'F',diatonic:'F'},Gb:{name:'Gb',label:'G♭',class:'black',diatonic:'G'},G:{name:'G',label:'G',class:'G',diatonic:'G'},Ab:{name:'Ab',label:'A♭',class:'black',diatonic:'A'},A:{name:'A',label:'A',class:'A',diatonic:'A'},Bb:{name:'Bb',label:'B♭',class:'black',diatonic:'B'},B:{name:'B',label:'B',class:'B',diatonic:'B'},Ctop:{name:'C',label:'C',class:'C',diatonic:'C',top:true}};
const naturalIndex={C:0,D:1,E:2,F:3,G:4,A:5,B:6},semi={C:0,Db:1,D:2,Eb:3,E:4,F:5,Gb:6,G:7,Ab:8,A:9,Bb:10,B:11};
const songs={twinkle:{title:'Twinkle Twinkle Little Star',notes:[['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]]},mary:{title:'Mary Had a Little Lamb',notes:[['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',2],['D4',1],['D4',1],['D4',2],['E4',1],['G4',1],['G4',2],['E4',1],['D4',1],['C4',1],['D4',1],['E4',1],['E4',1],['E4',1],['E4',1],['D4',1],['D4',1],['E4',1],['D4',1],['C4',2]]},ode:{title:'Ode to Joy',notes:[['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['E4',1.5],['D4',.5],['D4',2],['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],['C4',1],['C4',1],['D4',1],['E4',1],['D4',1.5],['C4',.5],['C4',2]]},jingle:{title:'Jingle Bells',notes:[['E4',1],['E4',1],['E4',2],['E4',1],['E4',1],['E4',2],['E4',1],['G4',1],['C4',1.5],['D4',.5],['E4',4],['F4',1],['F4',1],['F4',1.5],['F4',.5],['F4',1],['E4',1],['E4',1],['E4',.5],['E4',.5],['E4',1],['D4',1],['D4',1],['E4',1],['D4',2],['G4',2]]}};
function ensureContext(){if(!audioCtx)audioCtx=new AudioContextClass();return audioCtx.state==='suspended'?audioCtx.resume():Promise.resolve()}function wait(ms){return new Promise(r=>setTimeout(r,ms))}function svgEl(tag,attrs={}){const el=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el}function parseNote(id){const m=id.match(/^([A-G](?:b)?)(\d)$/);return{name:m[1],octave:parseInt(m[2],10)}}function noteLabel(id){const p=parseNote(id);return(stepInfo[p.name]?.label||p.name)+p.octave}function midi(id){const p=parseNote(id);return 12*(p.octave+1)+semi[p.name]}function frequency(id){return 440*Math.pow(2,(midi(id)-69)/12)}function noteY(id){const p=parseNote(id),info=stepInfo[p.name],idx=naturalIndex[info.diatonic]+7*(p.octave-4);return C4_Y-idx*(STAFF_SPACING/2)}function noteData(id){const p=parseNote(id),info=stepInfo[p.name];return{frequency:frequency(id),label:info.label,full:noteLabel(id),y:noteY(id),accidental:p.name.includes('b')?'♭':''}}
function keyNoteId(step){const info=stepInfo[step],oct=info.top?currentOctave+1:currentOctave;return info.name+oct}function transposeNote(id,offset){const p=parseNote(id);return p.name+(p.octave+offset)}function currentSongNotes(song){return song.notes.map(([id,d])=>[transposeNote(id,currentOctave-4),d])}function octaveRange(){return`C${currentOctave}–C${currentOctave+1}`}function updateOctaveUi(){octaveLabel.textContent=octaveRange();octaveDown.disabled=currentOctave<=MIN_OCTAVE;octaveUp.disabled=currentOctave>=MAX_OCTAVE;document.querySelectorAll('.key').forEach(key=>{const step=key.dataset.step,noteId=keyNoteId(step);key.id='key-'+noteId;key.dataset.note=noteId});updateKeyLabels()}
function clearPlayingButtons(){buttonEls.forEach(b=>b.classList.remove('playing'));document.querySelectorAll('.saved-button.playing').forEach(b=>b.classList.remove('playing'));document.getElementById('play-staff').classList.remove('playing')}function stopSound(){activeNodes.forEach(n=>{try{n.stop()}catch(_){}});activeNodes=[]}function clearVisuals(){document.querySelectorAll('.note-group.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.key.active').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.key-label.show').forEach(e=>e.classList.remove('show'))}function stopSong(){playToken++;stopSound();clearVisuals();clearPlayingButtons();statusEl.textContent='Stopped. Click Play Staff or click piano keys to write notes.'}function durationName(v){return v==.5?'eighth note':v==1?'quarter note':v==2?'half note':'whole note'}function beatMs(){return 60000/tempoBpm}function setTempo(v,redraw=true){tempoBpm=Math.max(50,Math.min(180,parseInt(v,10)||112));tempoSlider.value=String(tempoBpm);tempoValue.textContent=String(tempoBpm);if(redraw)renderCurrentStaff()}
function playPiano(id,duration){if(!audioCtx)return;const when=audioCtx.currentTime+.01,f=frequency(id),main=audioCtx.createOscillator(),harm=audioCtx.createOscillator(),gain=audioCtx.createGain(),harmGain=audioCtx.createGain();main.type='triangle';harm.type='sine';main.frequency.setValueAtTime(f,when);harm.frequency.setValueAtTime(f*2,when);harmGain.gain.value=.2;gain.gain.setValueAtTime(.0001,when);gain.gain.exponentialRampToValueAtTime(.25,when+.008);gain.gain.exponentialRampToValueAtTime(.13,when+.08);gain.gain.setValueAtTime(.08,Math.max(when+.1,when+duration-.06));gain.gain.exponentialRampToValueAtTime(.0001,when+duration);main.connect(gain);harm.connect(harmGain);harmGain.connect(gain);gain.connect(audioCtx.destination);main.start(when);harm.start(when);main.stop(when+duration+.03);harm.stop(when+duration+.03);activeNodes.push(main,harm)}function activateKey(id){const k=document.querySelector(`[data-note="${id}"]`);if(k)k.classList.add('active');const l=document.getElementById('K'+id);if(l)l.classList.add('show')}function deactivateKey(id){const k=document.querySelector(`[data-note="${id}"]`);if(k)k.classList.remove('active');const l=document.getElementById('K'+id);if(l)l.classList.remove('show')}function scrollToElement(el){if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}function scrollToNote(i,prefix='N'){scrollToElement(document.getElementById(prefix+i))}function durationGlyph(d){if(d===4)return{open:true,stem:false,flag:false};if(d===2)return{open:true,stem:true,flag:false};if(d===.5)return{open:false,stem:true,flag:true};return{open:false,stem:true,flag:false}}
function drawStaff(width,titleText){scoreSvg.innerHTML='';scoreSvg.setAttribute('width',width);scoreSvg.setAttribute('viewBox',`0 0 ${width} 260`);const title=svgEl('text',{x:22,y:24,fill:'#111827','font-size':'18','font-weight':'700'});title.textContent=titleText;scoreSvg.appendChild(title);const tempo=svgEl('text',{x:92,y:45,class:'tempo-mark'});tempo.textContent=`♩ = ${tempoBpm}`;scoreSvg.appendChild(tempo);const oct=svgEl('text',{x:190,y:45,class:'octave-mark'});oct.textContent=`Octave: ${octaveRange()}`;scoreSvg.appendChild(oct);for(let i=0;i<5;i++){const y=STAFF_TOP+i*STAFF_SPACING;scoreSvg.appendChild(svgEl('line',{x1:20,y1:y,x2:width-24,y2:y,class:'staff-line'}))}const clef=svgEl('text',{x:26,y:STAFF_TOP+58,class:'clef'});clef.textContent='𝄞';scoreSvg.appendChild(clef)}function drawLedgerLines(group,x,y){const bottom=STAFF_TOP+STAFF_SPACING*4,top=STAFF_TOP;if(y>bottom+STAFF_SPACING/2){for(let ly=bottom+STAFF_SPACING;ly<=y+1;ly+=STAFF_SPACING)group.appendChild(svgEl('line',{x1:x-14,y1:ly,x2:x+14,y2:ly,class:'ledger-line'}))}if(y<top-STAFF_SPACING/2){for(let ly=top-STAFF_SPACING;ly>=y-1;ly-=STAFF_SPACING)group.appendChild(svgEl('line',{x1:x-14,y1:ly,x2:x+14,y2:ly,class:'ledger-line'}))}}
function drawNote(id,index,beats,active=false,prefix='N',canEdit=false){const x=START_X+index*NOTE_SPACING,n=noteData(id),selected=canEdit&&index===selectedIndex,group=svgEl('g',{class:active?'note-group active':selected?'note-group selected':'note-group',id:prefix+index,'data-note':id}),rhythm=durationGlyph(beats);if(canEdit)group.addEventListener('pointerdown',e=>{e.stopPropagation();selectNote(index)});drawLedgerLines(group,x,n.y);if(n.accidental){const accidental=svgEl('text',{x:x-20,y:n.y+7,class:'accidental'});accidental.textContent=n.accidental;group.appendChild(accidental)}group.appendChild(svgEl('ellipse',{cx:x,cy:n.y,rx:10,ry:7,transform:`rotate(-20 ${x} ${n.y})`,class:rhythm.open?'notehead open':'notehead'}));if(rhythm.stem)group.appendChild(svgEl('line',{x1:x+9,y1:n.y-1,x2:x+9,y2:n.y-34,class:'note-stem'}));if(rhythm.flag)group.appendChild(svgEl('path',{d:`M ${x+9} ${n.y-34} q 20 8 8 24`,class:'flag'}));const noteName=svgEl('text',{x:x,y:238,class:'note-name'});noteName.textContent=n.full;group.appendChild(noteName);scoreSvg.appendChild(group);return group}
function addBarLines(list){let beats=0;list.forEach(([,duration],i)=>{beats+=duration;if(i<list.length-1&&Math.abs(beats%4)<.001){const x=START_X+i*NOTE_SPACING+22;scoreSvg.appendChild(svgEl('line',{x1:x,y1:STAFF_TOP,x2:x,y2:STAFF_TOP+STAFF_SPACING*4,class:'bar-line'}))}})}function renderStaticScore(title,list,prefix='N'){editable=false;selectedIndex=-1;currentTitle=title||'Song';currentStaffNotes=list.map(([n,d])=>[n,d]);const width=Math.max(960,START_X+list.length*NOTE_SPACING+110);drawStaff(width,currentTitle);list.forEach(([n,d],i)=>drawNote(n,i,d,false,prefix,false));addBarLines(list)}function renderEditableScore(activeIndex=-1){editable=true;currentSongId=null;currentStaffNotes=manualNotes.map(([n,d])=>[n,d]);const width=Math.max(960,START_X+manualNotes.length*NOTE_SPACING+110);drawStaff(width,currentTitle||'Your Notes');manualNotes.forEach(([n,d],i)=>drawNote(n,i,d,i===activeIndex,'M',true));addBarLines(manualNotes)}function renderCurrentStaff(){if(editable)renderEditableScore(selectedIndex);else if(currentSongId)buildScore(currentSongId);else renderStaticScore(currentTitle,currentStaffNotes,'N')}function buildScore(songId){currentSongId=songId;const song=songs[songId];renderStaticScore(song.title,currentSongNotes(song),'N')}
function updateKeyLabels(){document.querySelectorAll('.key-label').forEach(e=>e.remove());document.querySelectorAll('.key').forEach(key=>{const id=key.dataset.note,n=noteData(id),x=Number(key.getAttribute('x'))+Number(key.getAttribute('width'))/2,y=key.classList.contains('black')?Number(key.getAttribute('height'))-28:Number(key.getAttribute('height'))-34,text=svgEl('text',{id:'K'+id,x,y,class:'key-label always '+(key.classList.contains('black')?'black-label':'white-label')});text.textContent=n.full;piano.appendChild(text)})}function changeOctave(delta){const next=Math.max(MIN_OCTAVE,Math.min(MAX_OCTAVE,currentOctave+delta));if(next===currentOctave)return;currentOctave=next;updateOctaveUi();if(!editable&&currentSongId)buildScore(currentSongId);statusEl.textContent=`Octave changed to ${octaveRange()}. New piano clicks will use this range.`}
function clearStaff(){playToken++;stopSound();clearVisuals();clearPlayingButtons();manualNotes=[];currentStaffNotes=[];selectedIndex=-1;editable=true;currentSongId=null;currentTitle='Blank Staff';drawStaff(960,'Blank Staff — choose a note length, then click piano keys');scoreWrap.scrollLeft=0;statusEl.textContent=`Staff cleared. New notes will use octave ${octaveRange()}.`}function selectNote(index){if(!manualNotes.length)return;selectedIndex=Math.max(0,Math.min(index,manualNotes.length-1));durationSelect.value=String(manualNotes[selectedIndex][1]);renderEditableScore(selectedIndex);scrollToNote(selectedIndex,'M');const[id,d]=manualNotes[selectedIndex];statusEl.textContent=`Selected ${noteData(id).full}. Change Note Length to edit it. Current length: ${durationName(d)}.`}
function getSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(_){return {}}}function setSaved(saved){localStorage.setItem(STORAGE_KEY,JSON.stringify(saved))}function renderSavedButtons(){const saved=getSaved(),names=Object.keys(saved).filter(name=>saved[name]&&saved[name].showButton);savedControls.innerHTML='';if(!names.length)return;const label=document.createElement('span');label.className='saved-label';label.textContent='Saved:';savedControls.appendChild(label);names.forEach(name=>{const button=document.createElement('button');button.className='saved-button';button.textContent=name;button.addEventListener('click',()=>void playSaved(name,button));savedControls.appendChild(button)})}function saveStaff(){if(!currentStaffNotes.length){alert('There are no notes on the staff to save.');return}let name=prompt('Name this saved staff:','My Notes');if(name===null)return;name=name.trim();if(!name){alert('Save cancelled because no name was entered.');return}const saved=getSaved();if(saved[name]&&!confirm('A saved staff with that name already exists. Replace it?'))return;const showButton=confirm('Create a button for this saved staff on the interface?');saved[name]={title:name,notes:currentStaffNotes.map(([n,d])=>[n,d]),tempo:tempoBpm,octave:currentOctave,showButton,createdAt:new Date().toISOString()};setSaved(saved);renderSavedButtons();statusEl.textContent=showButton?`Saved "${name}" and created a button.`:`Saved "${name}" without creating a button.`}
async function playSaved(name,button){const saved=getSaved()[name];if(!saved||!saved.notes||!saved.notes.length){alert('This saved staff could not be found.');renderSavedButtons();return}await ensureContext();stopSong();if(saved.tempo)setTempo(saved.tempo,false);if(saved.octave){currentOctave=saved.octave;updateOctaveUi()}manualNotes=saved.notes.map(([n,d])=>[n,d]);currentTitle=saved.title||name;renderEditableScore(-1);const token=++playToken;if(button)button.classList.add('playing');statusEl.textContent=`Playing saved staff: ${currentTitle}.`;await playNoteSequence(manualNotes,currentTitle,token,'M');if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished saved staff: ${currentTitle}.`}}
async function playNoteSequence(list,title,token,prefix){for(let i=0;i<list.length;i++){if(token!==playToken)return;const[id,duration]=list[i],totalMs=beatMs()*duration,soundDuration=Math.max(.18,totalMs*.86/1000),noteGroup=document.getElementById(prefix+i);clearVisuals();if(noteGroup)noteGroup.classList.add('active');activateKey(id);scrollToNote(i,prefix);playPiano(id,soundDuration);statusEl.textContent=`${title}: ${noteData(id).full} (${durationName(duration)}) at ♩ = ${tempoBpm}`;await wait(totalMs*.86);deactivateKey(id);if(noteGroup)noteGroup.classList.remove('active');await wait(totalMs*.14)}}async function playCurrentStaff(){const list=editable?manualNotes:currentStaffNotes;if(!list||!list.length){statusEl.textContent='There are no notes on the staff to play.';return}await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();const token=++playToken,prefix=editable?'M':'N',button=document.getElementById('play-staff');button.classList.add('playing');statusEl.textContent=`Playing current staff: ${currentTitle}.`;await playNoteSequence(list,currentTitle||'Current Staff',token,prefix);if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished playing current staff: ${currentTitle}.`}}
async function playNoteManually(id){await ensureContext();playToken++;stopSound();clearVisuals();clearPlayingButtons();if(!editable){manualNotes=[];currentTitle='Your Notes';selectedIndex=-1;currentSongId=null}const duration=parseFloat(durationSelect.value)||1;manualNotes.push([id,duration]);selectedIndex=manualNotes.length-1;renderEditableScore(selectedIndex);const noteGroup=document.getElementById('M'+selectedIndex);activateKey(id);scrollToElement(noteGroup);playPiano(id,Math.max(.3,Math.min(1.2,duration*.45)));statusEl.textContent=`Added ${noteData(id).full} as a ${durationName(duration)}. Press Play Staff to hear all notes.`;setTimeout(()=>{deactivateKey(id);if(noteGroup)noteGroup.classList.remove('active')},520)}async function playSong(songId){await ensureContext();stopSong();manualNotes=[];const token=++playToken;buildScore(songId);clearPlayingButtons();const activeButton=document.querySelector(`.song-button[data-song="${songId}"]`);if(activeButton)activeButton.classList.add('playing');statusEl.textContent=`Playing ${songs[songId].title} in ${octaveRange()} at ♩ = ${tempoBpm}.`;await playNoteSequence(currentStaffNotes,songs[songId].title,token,'N');if(token===playToken){clearPlayingButtons();statusEl.textContent=`Finished ${songs[songId].title}.`}}
function changeDuration(){const duration=parseFloat(durationSelect.value)||1;if(editable&&selectedIndex>=0&&manualNotes[selectedIndex]){manualNotes[selectedIndex][1]=duration;renderEditableScore(selectedIndex);scrollToNote(selectedIndex,'M');const id=manualNotes[selectedIndex][0];statusEl.textContent=`Changed ${noteData(id).full} to a ${durationName(duration)}.`}else statusEl.textContent=`New notes will be entered as ${durationName(duration)}s.`}function moveSelected(delta){if(!manualNotes.length){statusEl.textContent='No editable notes yet. Click piano keys to add notes.';return}selectNote(selectedIndex<0?0:selectedIndex+delta)}function deleteSelected(){if(!editable||selectedIndex<0||!manualNotes[selectedIndex]){statusEl.textContent='Select a note first, then delete it.';return}const removed=manualNotes.splice(selectedIndex,1)[0];selectedIndex=Math.min(selectedIndex,manualNotes.length-1);renderEditableScore(selectedIndex);if(selectedIndex>=0)scrollToNote(selectedIndex,'M');statusEl.textContent=`Deleted ${noteData(removed[0]).full}.`}
updateOctaveUi();setTempo(112,false);durationSelect.value='1';buildScore('twinkle');renderSavedButtons();buttonEls.forEach(b=>b.addEventListener('click',()=>void playSong(b.dataset.song)));document.getElementById('play-staff').addEventListener('click',()=>void playCurrentStaff());document.getElementById('stop-song').addEventListener('click',stopSong);document.getElementById('clear-staff').addEventListener('click',clearStaff);document.getElementById('save-staff').addEventListener('click',saveStaff);document.getElementById('prev-note').addEventListener('click',()=>moveSelected(-1));document.getElementById('next-note').addEventListener('click',()=>moveSelected(1));document.getElementById('delete-note').addEventListener('click',deleteSelected);document.getElementById('octave-down').addEventListener('click',()=>changeOctave(-1));document.getElementById('octave-up').addEventListener('click',()=>changeOctave(1));durationSelect.addEventListener('change',changeDuration);tempoSlider.addEventListener('input',e=>{setTempo(e.target.value,true);statusEl.textContent=`Tempo changed to ♩ = ${tempoBpm} BPM.`});piano.addEventListener('pointerdown',e=>{e.preventDefault();const key=e.target.closest('.key');if(key)void playNoteManually(key.dataset.note)});
</script>
